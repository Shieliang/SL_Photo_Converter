<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SL Photo Converter</title>
    <style>
        /* 1. Basic global styles */
        :root {
            --primary-color: #4a90e2; 
            --primary-hover: #357abd;
            --success-color: #2ecc71; 
            --success-hover: #27ae60;
            --bg-color: #f0f4f8; 
            --text-color: #333;
            --subtitle-color: #666;
            --shadow-hard: 0 15px 35px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'PingFang SC', 'Helvetica Neue', 'Helvetica', 'Arial', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 2. Container styles - stable and grounded */
        .container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 50px 40px;
            width: 100%;
            max-width: 480px;
            border-radius: 24px;
            box-shadow: var(--shadow-hard);
            transition: box-shadow 0.3s ease; 
        }

        .container:hover {
            box-shadow: 0 18px 40px rgba(0,0,0,0.12); 
        }

        /* 3. Title and text */
        h2 {
            margin-top: 0;
            color: #2c3e50;
            font-size: 32px; /* Slightly increased font size for English title */
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--subtitle-color);
            font-size: 15px;
            margin-bottom: 40px;
            font-weight: 300;
        }

        /* 4. Control group styles */
        .control-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .control-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
            color: #555;
            font-size: 14px;
            padding-left: 5px;
        }

        input[type="file"] {
            width: 100%;
            padding: 12px;
            background: #fff;
            border: 2px dashed #ddd; 
            border-radius: 12px;
            cursor: pointer;
            color: #777;
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input[type="file"]:hover {
            border-color: var(--primary-color);
            background-color: rgba(74, 144, 226, 0.03);
        }

        select {
            width: 100%;
            padding: 14px;
            border: 1px solid #e1e4e8;
            border-radius: 12px;
            background-color: #fff;
            font-size: 15px;
            color: #333;
            appearance: none; 
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23ccc' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 14px center;
            background-size: 18px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }

        /* 5. Button styles */
        .btn {
            padding: 16px 25px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            font-weight: 600;
            transition: all 0.2s ease;
            box-sizing: border-box;
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.2);
            letter-spacing: 0.5px;
        }

        .btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px); 
            box-shadow: 0 6px 18px rgba(74, 144, 226, 0.3);
        }

        .btn:active {
            transform: translateY(1px); 
            box-shadow: 0 2px 6px rgba(74, 144, 226, 0.2);
        }

        .btn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-download {
            background-color: var(--success-color);
            margin-top: 0;
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.2);
        }

        .btn-download:hover {
            background-color: var(--success-hover);
            box-shadow: 0 6px 18px rgba(46, 204, 113, 0.3);
        }

        /* 6. Status and download area */
        #status {
            margin-top: 30px;
            font-size: 15px;
            color: var(--subtitle-color);
            font-weight: 400;
            line-height: 1.6;
            min-height: 24px;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            border-top-color: var(--primary-color);
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #downloadArea {
            display: none;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #eee;
            animation: fadeInUp 0.5s ease; 
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #downloadLink {
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>✨ SL Photo Converter</h2>
        <div class="subtitle">Fast, Lossless, and Serverless Image Processing</div>
        
        <div class="control-group">
            <label for="fileInput">📁 Step 1: Choose an Image (PNG/JPG/WEBP)</label>
            <input type="file" id="fileInput" accept="image/png, image/jpeg, image/webp, image/gif">
        </div>

        <div class="control-group">
            <label for="targetFormat">🎯 Step 2: Select Target Format</label>
            <select id="targetFormat">
                <option value="webp">Convert to WEBP (Best for Web, Smallest Size)</option>
                <option value="jpg">Convert to JPG (High Compatibility, Best for Photos)</option>
                <option value="png">Convert to PNG (Lossless, Preserves Transparency)</option>
            </select>
        </div>

        <button id="uploadBtn" class="btn" onclick="uploadAndProcess()">⚡ Upload & Convert</button>
        
        <div id="status"></div>

        <div id="downloadArea">
            <a id="downloadLink" href="#" target="_blank" rel="noopener noreferrer">
                <button class="btn btn-download">📥 Download Converted Image</button>
            </a>
        </div>
    </div>

    <script>
        // IMPORTANT: Put your API Gateway URL below!
        const API_URL = "API-GATEWAY-URL-HERE"; // e.g. https://abc123.execute-api.region.amazonaws.com/convert

        async function uploadAndProcess() {
            const fileInput = document.getElementById('fileInput');
            const targetFormat = document.getElementById('targetFormat').value;
            const statusDiv = document.getElementById('status');
            const uploadBtn = document.getElementById('uploadBtn');
            const downloadArea = document.getElementById('downloadArea');

            if (fileInput.files.length === 0) {
                alert('Please select an image first!');
                return;
            }

            const file = fileInput.files[0];
            uploadBtn.disabled = true;
            downloadArea.style.display = 'none';
            
            try {
                statusDiv.innerHTML = "<div class='spinner'></div>⏳ Connecting to AWS to secure upload channel...";
                const presignUrl = `${API_URL}?fileType=${encodeURIComponent(file.type)}&targetFormat=${encodeURIComponent(targetFormat)}`;
                
                const res = await fetch(presignUrl);
                const data = await res.json();
                
                if (!data.uploadURL) throw new Error("Failed to get upload credentials. Check API Gateway.");

                statusDiv.innerHTML = "<div class='spinner'></div>🚀 Uploading image to S3...";
                const uploadRes = await fetch(data.uploadURL, {
                    method: 'PUT',
                    body: file,
                    headers: { 'Content-Type': file.type || 'image/*' }
                });

                if (!uploadRes.ok) throw new Error("S3 Upload failed. Possible Content-Type mismatch!");

                statusDiv.innerHTML = `<div class='spinner'></div>✅ Upload successful! <span style='color:var(--primary-color);'>Converting to ${targetFormat.toUpperCase()}...</span>`;
                checkStatus(data.fileName);

            } catch (error) {
                console.error('Error:', error);
                statusDiv.innerHTML = "❌ Error: " + error.message;
                uploadBtn.disabled = false;
            }
        }

        async function checkStatus(fileName) {
            try {
                const response = await fetch(`${API_URL}?checkFile=${encodeURIComponent(fileName)}`);
                const data = await response.json();

                if (data.status === 'completed') {
                    document.getElementById('status').innerHTML = "🎉 Conversion Complete! Click below to download.";
                    document.getElementById('downloadLink').href = data.downloadURL;
                    document.getElementById('downloadArea').style.display = 'block'; 
                    document.getElementById('uploadBtn').disabled = false;
                } else {
                    document.getElementById('status').innerHTML = `<div class='spinner'></div>⚙️ Serverless engine processing...`;
                    setTimeout(() => {
                        checkStatus(fileName);
                    }, 2500); 
                }
            } catch (error) {
                document.getElementById('status').innerHTML = "❌ Status check failed. Please try again.";
                document.getElementById('uploadBtn').disabled = false;
            }
        }
    </script>
</body>
</html>
